<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Samora Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0F0E0B;--bg2:#1A1915;--bg3:#23211C;--surface:#2A2820;--surface2:#323028;--border:#3A3830;--border2:#4A4840;--text:#E8E4D8;--text2:#B8B4A8;--text3:#787468;--gold:#C49A2A;--gold2:#A07824;--green:#4A8C5C;--coral:#C0523F;--amber:#C07820;--blue:#3A6EA8;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:ui-monospace,'Fira Code',monospace;--r:8px;--r2:12px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
input,select,button,textarea{font-family:var(--sans)}
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:28px;width:340px}
.auth-card h2{font-size:15px;font-weight:500;margin-bottom:20px;color:var(--gold)}
.f{margin-bottom:14px}
.f label{display:block;font-size:12px;color:var(--text3);margin-bottom:5px}
.f input,.f select,.f textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;color:var(--text);font-size:14px;outline:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--gold2)}
.btn{width:100%;padding:10px;background:var(--gold2);border:none;border-radius:var(--r);color:#18160F;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:var(--gold)}
.btn-sm{width:auto;padding:6px 14px;font-size:12px}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--gold2);color:var(--text)}
.btn-danger{background:var(--coral);color:white}
.msg{font-size:12px;color:var(--coral);margin-top:8px;text-align:center}
.msg.ok{color:var(--green)}

#app{display:none;flex:1;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{font-size:16px;font-weight:600;color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-email{font-size:12px;color:var(--text3)}
.logout{background:none;border:1px solid var(--border);border-radius:var(--r);padding:4px 12px;color:var(--text3);cursor:pointer;font-size:12px}
.logout:hover{color:var(--text);border-color:var(--border2)}

.layout{display:flex;flex:1;min-height:0}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;overflow-y:auto}
.sb-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:12px 16px 4px}
.sb-item{padding:8px 16px;font-size:13px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:8px;border-left:2px solid transparent}
.sb-item:hover{color:var(--text);background:var(--surface)}
.sb-item.active{color:var(--gold);background:var(--surface);border-left-color:var(--gold)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

.main{flex:1;padding:24px;overflow-y:auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.card-sub{font-size:11px;color:var(--text3);margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row-label{font-size:13px;color:var(--text)}
.row-sub{font-size:11px;color:var(--text3)}
.sel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;font-size:12px;color:var(--text)}
.key-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;color:var(--text3);font-family:var(--mono);font-size:11px}
.key-input:focus{outline:none;border-color:var(--gold2);color:var(--text)}
.num{width:52px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px 8px;color:var(--text);font-size:13px;text-align:center}
.str{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;color:var(--text);font-size:12px;width:120px}
.toggle{width:32px;height:18px;border-radius:9px;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;border:none}
.toggle.on{background:var(--gold2)}.toggle.off{background:var(--border2)}
.toggle-dot{position:absolute;top:2px;width:14px;height:14px;border-radius:50%;background:white;transition:left 0.15s;pointer-events:none}
.toggle.on .toggle-dot{left:16px}.toggle.off .toggle-dot{left:2px}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block}
.pill-green{background:rgba(74,140,92,0.2);color:#6DB88A}
.pill-amber{background:rgba(160,117,42,0.2);color:var(--amber)}
.pill-gray{background:rgba(120,116,104,0.2);color:var(--text3)}
.pill-blue{background:rgba(58,110,168,0.2);color:#6BA4DA}
.stage-row{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:var(--r);padding:6px 10px;margin-bottom:6px}
.stage-num{font-size:11px;color:var(--text3);width:16px}
.stage-input{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;outline:none}
.stage-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}
.stage-del:hover{color:var(--coral)}
.user-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--bg3);border-radius:var(--r);margin-bottom:6px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold2);color:#18160F;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-info{flex:1}
.user-name{font-size:13px;font-weight:500}
.user-email{font-size:11px;color:var(--text3)}
.user-role{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.save-bar{display:flex;align-items:center;gap:12px;margin-top:16px}
.save-status{font-size:12px;color:var(--text3)}
.save-status.ok{color:var(--green)}.save-status.err{color:var(--coral)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px;color:var(--gold)}
.acct-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--surface);border-radius:4px;font-size:12px;color:var(--text2);margin:2px}
.acct-chip .x{cursor:pointer;color:var(--text3);font-size:14px}
.acct-chip .x:hover{color:var(--coral)}
.empty{font-size:12px;color:var(--text3);font-style:italic;padding:20px 0;text-align:center}
</style>
</head>
<body>

<div id="auth">
  <div style="font-size:20px;font-weight:600;color:var(--gold)">Samora Admin</div>
  <div class="auth-card">
    <h2>Sign in</h2>
    <div class="f"><label>Email</label><input id="aEmail" type="email" autocomplete="username"/></div>
    <div class="f"><label>Password</label><input id="aPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btn" onclick="login()">Sign in</button>
    <div class="msg" id="authMsg"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">Samora Admin</div>
    <div class="topbar-right">
      <span class="topbar-email" id="adminEmail"></span>
      <button class="logout" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sb-section">Clients</div>
      <div id="sidebar-clients"></div>
      <div style="padding:8px 16px"><button class="btn btn-sm" onclick="showNewOrgModal()" style="width:100%">+ New client</button></div>
    </div>
    <div class="main" id="main-area">
      <div class="empty">Select a client from the sidebar or create a new one</div>
    </div>
  </div>
</div>

<div id="modal-root"></div>

<script>
const SB_URL = localStorage.getItem('samora-admin-sb-url') || 'https://gowpuicpmrwsohongosf.supabase.co';
const SB_ANON = localStorage.getItem('samora-admin-sb-anon') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdvd3B1aWNwbXJ3c29ob25nb3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTExMDgsImV4cCI6MjA5NTk2NzEwOH0.35CjODxyxOjAKp-xBOBx4oAXO_qjLyVttVaJEhp7YEg';
const EDGE = SB_URL + '/functions/v1/sam-gmail-signals';
let me = null, orgs = [], activeOrg = null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function $(id){return document.getElementById(id)}

// ── Auth ──
async function login(){
  const email=$('aEmail').value.trim(), pass=$('aPass').value;
  if(!email||!pass){$('authMsg').textContent='Enter email and password';return}
  try{
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SB_ANON,'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(!d.access_token){$('authMsg').textContent=d.error_description||'Invalid credentials';return}
    me={id:d.user.id,email:d.user.email,token:d.access_token};
    const ck=await fetch(SB_URL+'/rest/v1/samora_admins?user_id=eq.'+me.id+'&select=id&limit=1',{headers:{'apikey':SB_ANON,'Authorization':'Bearer '+me.token}});
    const ckr=await ck.json();
    if(!Array.isArray(ckr)||!ckr.length){me=null;$('authMsg').textContent='Not a Samora admin';return}
    $('adminEmail').textContent=me.email;
    $('auth').style.display='none';$('app').style.display='flex';
    loadOrgs();
  }catch(e){$('authMsg').textContent='Error: '+e.message}
}
function doLogout(){me=null;orgs=[];activeOrg=null;$('app').style.display='none';$('auth').style.display='flex'}

async function edgeCall(action,payload){
  const r=await fetch(EDGE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+me.token,'apikey':SB_ANON},body:JSON.stringify(Object.assign({action},payload||{}))});
  return await r.json();
}

// ── Load orgs ──
async function loadOrgs(){
  const d=await edgeCall('admin_list_orgs');
  orgs=d.orgs||[];
  renderSidebar();
  if(activeOrg)selectOrg(activeOrg);
}
function renderSidebar(){
  $('sidebar-clients').innerHTML=orgs.length?orgs.map(o=>'<div class="sb-item'+(activeOrg===o.org_id?' active':'')+'" onclick="selectOrg(\''+o.org_id+'\')"><div class="dot"></div>'+esc(o.display_name||o.name)+'</div>').join(''):'<div style="padding:8px 16px;font-size:12px;color:var(--text3)">No clients yet</div>';
}

// ── Select org ──
async function selectOrg(orgId){
  activeOrg=orgId;renderSidebar();
  const org=orgs.find(o=>o.org_id===orgId);
  if(!org){$('main-area').innerHTML='<div class="empty">Org not found</div>';return}
  const users=await edgeCall('admin_list_users',{org_id:orgId});
  renderOrgPage(org,users.users||[]);
}

function renderOrgPage(org,users){
  const s=org.settings||{};
  const stages=s.deal_stages||[{key:'prospective',label:'Prospective'},{key:'value_prop',label:'Value Prop'},{key:'commercial',label:'Commercial'}];
  const features=s.features||{};
  const roles=s.role_labels||{};

  $('main-area').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div>
        <div style="font-size:18px;font-weight:500">${esc(org.display_name||org.name)}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">org_id: ${esc(org.org_id)} · ${users.length} users</div>
      </div>
      <span class="pill pill-green">Active</span>
    </div>

    <!-- Users section -->
    <div class="card">
      <div class="card-title">Team <button class="btn btn-sm btn-outline" onclick="showAddUserModal('${org.org_id}')">+ Add rep</button></div>
      <div id="user-list">
        ${users.length?users.map(u=>`<div class="user-row">
          <div class="user-avatar">${esc((u.name||u.email||'?').slice(0,2).toUpperCase())}</div>
          <div class="user-info">
            <div class="user-name">${esc(u.name||u.email)}</div>
            <div class="user-email">${esc(u.email)} · ${u.account_count||0} accounts</div>
          </div>
          <span class="user-role">${esc(u.role||'member')}</span>
          <button class="btn btn-sm btn-outline" onclick="showAssignAccountsModal('${org.org_id}','${u.user_id}','${esc(u.name||u.email)}')">Assign accounts</button>
        </div>`).join(''):'<div class="empty">No users yet — add reps to get started</div>'}
      </div>
    </div>

    <!-- Config section -->
    <div class="grid2">
      <div class="card">
        <div class="card-title">Feature flags</div>
        ${['sam_intelligence','account_coverage','intent_vs_reality','account_intel_ai','digest_reports'].map(f=>`<div class="row"><div class="row-label">${({sam_intelligence:'SAM Intelligence',account_coverage:'Coverage tracking',intent_vs_reality:'Intent vs Reality',account_intel_ai:'AI Intel (Gemini)',digest_reports:'Digest reports'})[f]||f}</div><button class="toggle ${features[f]!==false?'on':'off'}" id="flag-${f}" onclick="this.classList.toggle('on');this.classList.toggle('off');markDirty()"><div class="toggle-dot"></div></button></div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Integrations</div>
        <div class="row"><div class="row-label">Email provider</div><select class="sel" id="cfg-email" onchange="markDirty()"><option value="gmail" ${(s.email_provider||'gmail')==='gmail'?'selected':''}>Gmail</option><option value="outlook" ${s.email_provider==='outlook'?'selected':''}>Outlook</option><option value="both" ${s.email_provider==='both'?'selected':''}>Both</option></select></div>
        <div class="row"><div class="row-label">AI engine</div><select class="sel" id="cfg-ai" onchange="markDirty()"><option value="gemini" ${(s.ai_engine||'gemini')==='gemini'?'selected':''}>Gemini</option><option value="openai" ${s.ai_engine==='openai'?'selected':''}>OpenAI</option><option value="none" ${s.ai_engine==='none'?'selected':''}>None (SAM only)</option></select></div>
        <div style="margin-top:10px"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">AI API key</div><input class="key-input" id="cfg-ai-key" type="password" placeholder="Enter to update" oninput="markDirty()"/></div>
        <div style="margin-top:8px"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">Google OAuth Client ID</div><input class="key-input" id="cfg-g-id" type="password" placeholder="Enter to update" oninput="markDirty()"/></div>
        <div style="margin-top:8px"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">Google OAuth Client Secret</div><input class="key-input" id="cfg-g-secret" type="password" placeholder="Enter to update" oninput="markDirty()"/></div>
      </div>
      <div class="card">
        <div class="card-title">Deal stages</div>
        <div id="stage-list">${stages.map((st,i)=>`<div class="stage-row" id="stg-${i}"><span class="stage-num">${i+1}</span><input class="stage-input" data-key="${st.key}" value="${esc(st.label)}" oninput="markDirty()"/><button class="stage-del" onclick="this.parentElement.remove();markDirty()">×</button></div>`).join('')}</div>
        <button onclick="addStage()" style="margin-top:6px;font-size:12px;padding:5px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;width:100%">+ Add stage</button>
      </div>
      <div class="card">
        <div class="card-title">Thresholds</div>
        <div class="row"><div class="row-label">Going cold after</div><div style="display:flex;align-items:center;gap:6px"><input class="num" id="cfg-stale" type="number" value="${s.stale_days||10}" oninput="markDirty()"/><span style="font-size:11px;color:var(--text3)">days</span></div></div>
        <div class="row"><div class="row-label">Unanswered after</div><div style="display:flex;align-items:center;gap:6px"><input class="num" id="cfg-unans" type="number" value="${s.unanswered_days||3}" oninput="markDirty()"/><span style="font-size:11px;color:var(--text3)">days</span></div></div>
        <div class="row"><div class="row-label">Lookback window</div><div style="display:flex;align-items:center;gap:6px"><input class="num" id="cfg-lookback" type="number" value="${s.lookback_days||90}" oninput="markDirty()"/><span style="font-size:11px;color:var(--text3)">days</span></div></div>
        <div style="margin-top:12px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Role labels</div>
        ${['sdr','ae','manager','director'].map(r=>`<div class="row"><div class="row-label">${r}</div><input class="str" id="cfg-role-${r}" value="${esc(roles[r]||r.toUpperCase())}" oninput="markDirty()"/></div>`).join('')}
      </div>
    </div>
    <div class="save-bar"><button class="btn btn-sm" onclick="saveConfig('${org.org_id}')">Save configuration</button><span class="save-status" id="save-status"></span></div>`;
}

function addStage(){
  const list=$('stage-list');if(!list)return;
  const i=list.querySelectorAll('.stage-row').length;
  const d=document.createElement('div');d.className='stage-row';d.id='stg-'+i;
  d.innerHTML='<span class="stage-num">'+(i+1)+'</span><input class="stage-input" data-key="stage_'+i+'" value="" placeholder="Stage name" oninput="markDirty()"/><button class="stage-del" onclick="this.parentElement.remove();markDirty()">×</button>';
  list.appendChild(d);d.querySelector('.stage-input').focus();markDirty();
}
function markDirty(){const s=$('save-status');if(s){s.textContent='Unsaved changes';s.className='save-status'}}

async function saveConfig(orgId){
  const s=$('save-status');if(s){s.textContent='Saving…';s.className='save-status'}
  const features={};
  ['sam_intelligence','account_coverage','intent_vs_reality','account_intel_ai','digest_reports'].forEach(k=>{
    const t=$('flag-'+k);if(t)features[k]=t.classList.contains('on');
  });
  const stageInputs=document.querySelectorAll('#stage-list .stage-input');
  const deal_stages=Array.from(stageInputs).map((inp,i)=>({key:inp.dataset.key||'stage_'+i,label:inp.value.trim()||'Stage '+(i+1),color:''})).filter(st=>st.label);
  const role_labels={};
  ['sdr','ae','manager','director'].forEach(r=>{const el=$('cfg-role-'+r);if(el)role_labels[r]=el.value.trim()||r.toUpperCase()});
  const settings={email_provider:$('cfg-email')?.value,ai_engine:$('cfg-ai')?.value,deal_stages,features,role_labels,stale_days:parseInt($('cfg-stale')?.value)||10,unanswered_days:parseInt($('cfg-unans')?.value)||3,lookback_days:parseInt($('cfg-lookback')?.value)||90};
  const aiKey=$('cfg-ai-key')?.value;if(aiKey)settings.ai_api_key=aiKey;
  const gId=$('cfg-g-id')?.value;if(gId)settings.google_client_id=gId;
  const gSec=$('cfg-g-secret')?.value;if(gSec)settings.google_client_secret=gSec;
  const d=await edgeCall('upsert_org_settings',{org_id:orgId,settings});
  if(d.ok){if(s){s.textContent='Saved ✓';s.className='save-status ok'}loadOrgs()}
  else{if(s){s.textContent='Error: '+(d.error||'unknown');s.className='save-status err'}}
}

// ── New Org Modal ──
function showNewOrgModal(){
  $('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>Create new client</h3>
    <div class="f"><label>Organisation name *</label><input id="mo-name"/></div>
    <div class="f"><label>Org code (auto-generated if blank)</label><input id="mo-code" placeholder="e.g. genefied"/></div>
    <div class="grid2">
      <div class="f"><label>Default currency</label><select id="mo-currency" class="sel" style="width:100%"><option>USD</option><option>INR</option><option>EUR</option><option>GBP</option><option>AED</option><option>SAR</option><option>SGD</option></select></div>
      <div class="f"><label>Email provider</label><select id="mo-email" class="sel" style="width:100%"><option>gmail</option><option>outlook</option><option>both</option></select></div>
    </div>
    <div class="f"><label>AI engine</label><select id="mo-ai" class="sel" style="width:100%"><option value="gemini">Gemini</option><option value="openai">OpenAI</option><option value="none">None (SAM only)</option></select></div>
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn" onclick="createOrg()">Create organisation</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
    <div class="msg" id="mo-msg"></div>
  </div></div>`;
}
async function createOrg(){
  const name=$('mo-name')?.value?.trim();
  if(!name){$('mo-msg').textContent='Name is required';return}
  $('mo-msg').textContent='Creating…';$('mo-msg').className='msg ok';
  const d=await edgeCall('admin_create_org',{
    name,org_code:$('mo-code')?.value?.trim()||undefined,
    default_currency:$('mo-currency')?.value,email_provider:$('mo-email')?.value,ai_engine:$('mo-ai')?.value
  });
  if(d.ok){closeModal();activeOrg=d.org.id;loadOrgs()}
  else{$('mo-msg').textContent='Error: '+(d.error||'unknown');$('mo-msg').className='msg'}
}

// ── Add User Modal ──
function showAddUserModal(orgId){
  $('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>Add team member</h3>
    <div class="f"><label>Email *</label><input id="mu-email" type="email" placeholder="rep@company.com"/></div>
    <div class="f"><label>Temp password * (they can change later)</label><input id="mu-pass" type="text" value="${generatePass()}"/></div>
    <div class="grid2">
      <div class="f"><label>Name</label><input id="mu-name" placeholder="Full name"/></div>
      <div class="f"><label>Role</label><select id="mu-role" class="sel" style="width:100%"><option value="sdr">SDR (Tier 1)</option><option value="ae">AE (Tier 1)</option><option value="manager">Manager (Tier 2)</option><option value="director">Director (Tier 3)</option><option value="executive">CXO (Tier 4)</option><option value="admin">Company Admin (Tier 5)</option></select></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn" onclick="createUser('${orgId}')">Create user</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
    <div class="msg" id="mu-msg"></div>
  </div></div>`;
}
function generatePass(){return 'Sam'+Math.random().toString(36).slice(2,8)+'!'}
async function createUser(orgId){
  const email=$('mu-email')?.value?.trim(),pass=$('mu-pass')?.value,name=$('mu-name')?.value?.trim(),role=$('mu-role')?.value;
  if(!email||!pass){$('mu-msg').textContent='Email and password required';return}
  $('mu-msg').textContent='Creating…';$('mu-msg').className='msg ok';
  const d=await edgeCall('admin_create_user',{org_id:orgId,email,password:pass,name,role});
  if(d.ok){closeModal();selectOrg(orgId)}
  else{$('mu-msg').textContent='Error: '+(d.error||'unknown');$('mu-msg').className='msg'}
}

// ── Assign Accounts Modal ──
function showAssignAccountsModal(orgId,userId,userName){
  $('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>Assign accounts to ${esc(userName)}</h3>
    <div class="card-sub">Add one per line: Account Name, Domain (optional), Region (optional)</div>
    <div class="f"><textarea id="ma-accounts" rows="8" placeholder="Ferrero, ferrero.com, India\nShell, shell.com, Middle East\nLactalis, lactalis.com\nGrupo Bimbo" style="font-size:13px;line-height:1.6"></textarea></div>
    <div style="display:flex;gap:8px"><button class="btn" onclick="assignAccounts('${orgId}','${userId}')">Assign accounts</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
    <div class="msg" id="ma-msg"></div>
  </div></div>`;
}
async function assignAccounts(orgId,userId){
  const lines=($('ma-accounts')?.value||'').split('\n').filter(l=>l.trim());
  if(!lines.length){$('ma-msg').textContent='Enter at least one account';return}
  const accounts=lines.map(l=>{
    const parts=l.split(',').map(p=>p.trim());
    return{name:parts[0],domain:parts[1]||null,region:parts[2]||null};
  }).filter(a=>a.name);
  $('ma-msg').textContent='Assigning '+accounts.length+' accounts…';$('ma-msg').className='msg ok';
  const d=await edgeCall('admin_assign_accounts',{org_id:orgId,user_id:userId,accounts});
  if(d.ok){
    $('ma-msg').textContent='Created: '+d.created.join(', ')+(d.skipped.length?' · Skipped (already assigned): '+d.skipped.join(', '):'');
    $('ma-msg').className='msg ok';
    setTimeout(()=>{closeModal();selectOrg(orgId)},2000);
  }else{$('ma-msg').textContent='Error: '+(d.error||'unknown');$('ma-msg').className='msg'}
}

function closeModal(){$('modal-root').innerHTML=''}
</script>
